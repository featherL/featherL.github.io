<script src="./purl.js"></script>
<script>
	var url = purl();
	if (url.attr('host') == 'featherl.github.io') {
		var old_url = url.attr('source');
		var new_url = old_url.replace('https://featherl.github.io', "https://www.xi4oyu.top");

		var rep = /\/archives\/([a-z0-9]+)\.html/;
		new_url = new_url.replace(rep, '/$1/');

		window.location.replace(new_url); 
	}else{
		window.location.href="https://www.xi4oyu.top";
	}
    
</script>
